version: "3.9"

# ── Local development stack for HCIP Ingestion Pipeline ──────────────────────
# Starts Redis, Qdrant, and Neo4j.
# AWS S3, Supabase, and Anthropic are cloud services — configure in .env
#
# Usage:
#   docker-compose up -d          # start all services in background
#   docker-compose down           # stop all services
#   docker-compose down -v        # stop + delete volumes (fresh start)
#   docker-compose logs -f redis  # tail logs for one service

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Used as: Celery broker + result backend + embedding/ontology cache
  redis:
    image: redis:7.2-alpine
    container_name: hcip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Qdrant ────────────────────────────────────────────────────────────────
  # Used as: vector store for text (1024-dim), image (128-dim), table embeddings
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: hcip_qdrant
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  # Used as: medical knowledge graph (entities, relationships)
  neo4j:
    image: neo4j:5.20-community
    container_name: hcip_neo4j
    ports:
      - "7474:7474"   # Browser UI  →  http://localhost:7474
      - "7687:7687"   # Bolt protocol (application connection)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/hcip_password   # user/password — change in production
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "hcip_password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  # Used as: BM25 keyword retrieval (Phase 14)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: hcip_elasticsearch
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  # Scrapes /metrics from the HCIP API every 15s
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hcip_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # ── Grafana Tempo (distributed tracing backend) ────────────────────────────
  # Receives OTLP traces from the API; queried by Grafana
  tempo:
    image: grafana/tempo:2.5.0
    container_name: hcip_tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4318:4318"   # OTLP HTTP receiver (← set OTEL_ENDPOINT to this)
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  # Dashboard: http://localhost:3000  (admin / hcip_grafana)
  grafana:
    image: grafana/grafana:11.1.0
    platform: linux/amd64
    container_name: hcip_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hcip_grafana
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  es_data:
  prometheus_data:
  tempo_data:
  grafana_data:
