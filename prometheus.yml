global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # HCIP FastAPI application metrics
  - job_name: hcip-api
    static_configs:
      - targets: ["hcip-api:8000"]
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
